        - heading "Processing Delays" [level=3] [ref=e63]
        - paragraph [ref=e64]: Vessel time runs at hundreds of thousands of dollars per day. A navigation error discovered late means downtime, reprocessing, and in the worst case — remobilisation. Every hour of delay burns budget that cannot be recovered.
      - generic [ref=e65]:
        - img [ref=e68]
        - heading "Compliance Risk" [level=3] [ref=e70]
        - paragraph [ref=e71]: Regulatory bodies and E&P clients demand audit-ready positioning records. Generic tools adapted from hydrographic workflows introduce gaps in traceability. FGPS produces comprehensive, defensible QC reports built for seismic deliverable standards.
      - generic [ref=e72]:
        - img [ref=e75]
        - heading "Quality Uncertainty" [level=3] [ref=e78]
        - paragraph [ref=e79]: Traditional QC is backward-looking — you find problems after the vessel has moved on. Without real-time quality monitoring, you are relying on hope rather than data. SeisCloudNAV puts live navigation quality in your browser, minutes after acquisition.
